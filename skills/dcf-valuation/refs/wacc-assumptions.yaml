# ── WACC Escalation Triggers ────────────────────────────────────────────────
# Use WACC_HIGH if any of these risk factors present:
escalation_triggers:
  - "Single customer >25% of revenue"
  - "Revenue CAGR <2% over last 3 years (declining business)"
  - "No audited financial statements available"
  - "Key-person dependency: founder is sole technical expert"
  - "Operating in single geography with >80% revenue concentration"
  - "Pending material litigation or regulatory investigation"
