# ── Cycle Adjustment Notes ───────────────────────────────────────────────────
cycle_notes:
  reference_year: 2025
  rate_environment: "Rates elevated vs. 2021 peak; multiples compressed ~1.5x turns vs. 2021 peaks"
  adjustment_guidance: >
    For transactions completed 2020–2021, apply a downward adjustment of 1.0–1.5x
    EV/EBITDA when comparing to current deals, reflecting rate normalization impact.
