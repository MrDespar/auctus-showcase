# WACC Assumptions Reference
# Referenced by: skills/dcf-valuation/SKILL.md Step 2
# Source: Damodaran Europe (Jan 2026) + AUCTUS internal adjustments
# Update: quarterly (align with latest Damodaran release and Bund yield)

# ── Macro Inputs (update quarterly) ────────────────────────────────────────
macro:
  risk_free_rate: 0.0250          # German 10Y Bund yield
  equity_risk_premium: 0.0550     # Damodaran Europe ERP (Western Europe)
  size_premium_bps: 150           # Mid-market illiquidity premium
  update_date: "2026-Q1"

# ── WACC Ranges by Sector (midpoint = recommended base case) ────────────────
# Format: low / midpoint / high represent ±1 standard deviation range
